<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rugby Scoreboard Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px;
    width: 100%;
    padding-top: 40px;
  }

  .scoreboard-wrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.35));
    position: relative;
    transform: scale(0.7);
    transform-origin: top center;
  }

  /* ── Try badges — absolutely positioned by JS ── */
  .try-badge {
    display: none;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    border-radius: 3px 3px 0 0;
    padding: 2px 8px;
    line-height: 1;
    position: absolute;
    white-space: nowrap;
    overflow: hidden;
    z-index: 10;
  }
  .try-badge.show { display: inline-flex; }

  .try-count {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 13px;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .try-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .try-badge::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--team-color, #888);
  }

  /* ── Main bar ── */
  .main-bar {
    display: inline-flex;
    align-items: stretch;
    border-radius: 4px;
    overflow: hidden;
  }

  .score-panel {
    display: inline-flex;
    align-items: center;
    background: #fff;
    padding: 8px 18px;
    gap: 0;
  }

  .team-home,
  .team-away {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .team-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }
  #homeDot { background: #1e6bb8; }
  #awayDot { background: #b81e1e; }

  .team-name {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 1.5px;
    color: #222;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
  }

  .team-score {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 26px;
    line-height: 1;
    color: #111;
    white-space: nowrap;
  }

  .separator {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 24px;
    color: #bbb;
    padding: 0 14px;
    line-height: 1;
    align-self: center;
  }

  .timer-block {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    padding: 8px 16px;
    white-space: nowrap;
  }

  .timer-display {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div class="scoreboard-wrap" id="wrap">

  <!-- Try badges — live outside the bar, positioned by JS -->
  <span class="try-badge" id="homeTryBadge"><span class="try-count" id="homeTryCount">1</span><span class="try-label">T</span></span>
  <span class="try-badge" id="awayTryBadge"><span class="try-count" id="awayTryCount">1</span><span class="try-label">T</span></span>

  <div class="main-bar" id="mainBar">
    <div class="score-panel">
      <div class="team-home">
        <span class="team-dot" id="homeDot"></span>
        <span class="team-name" id="homeName">HOME</span>
        <span class="team-score" id="homeScore">0</span>
      </div>
      <div class="separator">|</div>
      <div class="team-away">
        <span class="team-score" id="awayScore">0</span>
        <span class="team-name" id="awayName">AWAY</span>
        <span class="team-dot" id="awayDot"></span>
      </div>
    </div>
    <div class="timer-block">
      <div class="timer-display" id="timerDisplay">00:00</div>
    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const app = firebase.initializeApp({
    databaseURL: 'https://stream-tools-mrc-default-rtdb.europe-west1.firebasedatabase.app'
  });
  const db  = firebase.database();
  const ref = db.ref('overlayData');

  let cloudState = null;

  function pad(n) { return String(Math.floor(Math.abs(n))).padStart(2, '0'); }

  function getLiveSeconds(d) {
    const base = d.timerSeconds || 0;
    if (!d.timerRunning || !d.timerStartedAt) return base;
    return base + (Date.now() - d.timerStartedAt) / 1000;
  }

  // Walk up offsetParent chain to get position relative to an ancestor
  function getOffsetRelativeTo(el, ancestor) {
    let x = 0, y = 0, cur = el;
    while (cur && cur !== ancestor) {
      x += cur.offsetLeft;
      y += cur.offsetTop;
      cur = cur.offsetParent;
    }
    return { x, y };
  }

  function positionBadge(badgeId, scoreId) {
    const badge = document.getElementById(badgeId);
    const score = document.getElementById(scoreId);
    const wrap  = document.getElementById('wrap');
    const bar   = document.getElementById('mainBar');
    if (!badge || !score || !wrap || !bar) return;

    // Get score center relative to wrap
    const scorePos = getOffsetRelativeTo(score, wrap);
    const scoreCenterX = scorePos.x + score.offsetWidth / 2;

    // Get mainBar top relative to wrap
    const barPos = getOffsetRelativeTo(bar, wrap);

    // Center badge horizontally over score
    badge.style.left = (scoreCenterX - badge.offsetWidth / 2) + 'px';
    // Place badge directly above the main bar
    badge.style.top = (barPos.y - badge.offsetHeight - 2) + 'px';
  }

  function positionTries() {
    positionBadge('homeTryBadge', 'homeScore');
    positionBadge('awayTryBadge', 'awayScore');
  }

  function apply(d) {
    if (!d) return;

    document.getElementById('homeName').textContent  = d.homeName  || 'HOME';
    document.getElementById('awayName').textContent  = d.awayName  || 'AWAY';
    document.getElementById('homeScore').textContent = d.homeScore ?? 0;
    document.getElementById('awayScore').textContent = d.awayScore ?? 0;

    const hc = d.homeColor || '#1e6bb8';
    const ac = d.awayColor || '#b81e1e';
    document.getElementById('homeDot').style.background = hc;
    document.getElementById('awayDot').style.background = ac;

    const ht = d.homeTries || 0;
    const at = d.awayTries || 0;
    const hBadge = document.getElementById('homeTryBadge');
    const aBadge = document.getElementById('awayTryBadge');

    if (ht > 0) {
      hBadge.classList.add('show');
      hBadge.style.setProperty('--team-color', hc);
      document.getElementById('homeTryCount').textContent = ht;
    } else {
      hBadge.classList.remove('show');
    }

    if (at > 0) {
      aBadge.classList.add('show');
      aBadge.style.setProperty('--team-color', ac);
      document.getElementById('awayTryCount').textContent = at;
    } else {
      aBadge.classList.remove('show');
    }

    // Position after DOM updates settle
    requestAnimationFrame(positionTries);
  }

  function tick() {
    if (!cloudState) return;
    const secs = getLiveSeconds(cloudState);
    document.getElementById('timerDisplay').textContent = `${pad(secs / 60)}:${pad(secs % 60)}`;
  }

  ref.on('value', snap => {
    const d = snap.val();
    if (!d) return;
    cloudState = d;
    apply(d);
  });

  setInterval(tick, 500);
</script>
</body>
</html>
