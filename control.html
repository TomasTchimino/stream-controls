<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Rugby Control</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --muted:   #6e7681;
    --text:    #e6edf3;
    --green:   #2ecc71;
    --red:     #e94560;
    --orange:  #f0a500;
    --radius:  12px;
  }

  html { height: 100%; -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    padding: 12px;
    padding-top: max(env(safe-area-inset-top), 12px);
    padding-bottom: max(env(safe-area-inset-bottom), 24px);
    padding-left: max(env(safe-area-inset-left), 12px);
    padding-right: max(env(safe-area-inset-right), 12px);
    -webkit-overflow-scrolling: touch;
  }

  .page-header { margin-bottom: 12px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
    margin-bottom: 2px;
  }
  .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    width: 100%;
  }
  .card.home { border-top: 3px solid var(--home-color, #1e6bb8); }
  .card.away { border-top: 3px solid var(--away-color, #b81e1e); }
  .card.timer-card { border-top: 3px solid var(--green); }
  .card-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .team-name-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 10px;
    outline: none;
    min-width: 0;
  }
  .team-name-input:focus { border-color: #58a6ff; }
  .color-wrap {
    position: relative;
    width: 48px; height: 48px;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .color-wrap input[type="color"] {
    position: absolute;
    inset: -6px;
    width: calc(100% + 12px);
    height: calc(100% + 12px);
    border: none;
    padding: 0;
    cursor: pointer;
  }

  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    text-align: center;
    margin-bottom: 12px;
    user-select: none;
  }

  .score-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    padding: 16px 0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.08s;
  }
  .btn:active { transform: scale(0.94); }
  .btn-try  { background: #238636; color: #fff; }
  .btn-pen  { background: #1158a6; color: #fff; }
  .btn-con  { background: #6e40c9; color: #fff; }
  .btn-undo { background: var(--border); color: var(--text); }
  .btn-label { display: block; font-size: 10px; font-weight: 400; letter-spacing: 1.5px; opacity: 0.7; text-transform: uppercase; margin-top: 2px; }

  .try-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding-top: 6px;
  }
  .try-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--muted);
    letter-spacing: 2px;
    line-height: 1;
  }
  .try-display span { color: var(--text); font-size: 26px; }
  .try-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    width: 44px; height: 44px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.08s;
  }
  .try-btn:active { transform: scale(0.9); }

  .timer-face {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 4px;
    text-align: center;
    color: var(--green);
    line-height: 1;
    margin-bottom: 12px;
  }
  .timer-face.paused { color: #555; }

  .timer-btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .btn-timer {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px 0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.08s;
  }
  .btn-timer:active  { transform: scale(0.94); }
  .btn-timer:disabled { opacity: 0.35; }
  .btn-start  { background: var(--green);  color: var(--bg); }
  .btn-pause  { background: var(--orange); color: var(--bg); }
  .btn-treset { background: var(--border); color: var(--text); }

  .time-set-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--muted);
  }
  .time-set-row input[type="number"] {
    width: 56px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    text-align: center;
    padding: 8px 4px;
    outline: none;
  }
  .time-set-row input:focus { border-color: var(--green); }
  .btn-settime {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 14px;
    border: 1px solid var(--green);
    border-radius: 6px;
    background: transparent;
    color: var(--green);
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-reset {
    width: 100%;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 16px;
    border: 1px solid #f85149;
    border-radius: 10px;
    background: transparent;
    color: #f85149;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .status-bar {
    margin-top: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    word-break: break-word;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .status-dot.ok     { background: var(--green); }
  .status-dot.err    { background: #e74c3c; }
  .status-dot.saving { background: var(--orange); animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { opacity:1 } to { opacity:0.25 } }
</style>
</head>
<body>

<div class="page-header">
  <h1>Rugby Scoreboard</h1>
  <div class="subtitle">MATCH CONTROL — Firebase Realtime</div>
</div>

<div class="grid">

  <!-- Home -->
  <div class="card home" id="homeCard">
    <div class="card-title">Home Team</div>
    <div class="name-row">
      <input class="team-name-input" id="homeNameInput" value="HOME" maxlength="16" autocorrect="off" />
      <div class="color-wrap" title="Team colour">
        <input type="color" id="homeColorPicker" value="#1e6bb8" oninput="onColorChange('home')" onchange="onColorChange('home')" />
      </div>
    </div>
    <div class="score-display" id="homeScoreDisplay">0</div>
    <div class="score-btns">
      <button class="btn btn-try"  onclick="addScore('home',5)">+5<span class="btn-label">Try</span></button>
      <button class="btn btn-pen"  onclick="addScore('home',3)">+3<span class="btn-label">Penalty</span></button>
      <button class="btn btn-con"  onclick="addScore('home',2)">+2<span class="btn-label">Conv.</span></button>
      <button class="btn btn-undo" onclick="addScore('home',-1)">-1<span class="btn-label">Fix</span></button>
    </div>
    <div class="try-row">
      <button class="try-btn" onclick="addTries('home',-1)">−</button>
      <div class="try-display">Tries: <span id="homeTriesDisplay">0</span></div>
      <button class="try-btn" onclick="addTries('home',1)">+</button>
    </div>
  </div>

  <!-- Away -->
  <div class="card away" id="awayCard">
    <div class="card-title">Away Team</div>
    <div class="name-row">
      <input class="team-name-input" id="awayNameInput" value="AWAY" maxlength="16" autocorrect="off" />
      <div class="color-wrap" title="Team colour">
        <input type="color" id="awayColorPicker" value="#b81e1e" oninput="onColorChange('away')" onchange="onColorChange('away')" />
      </div>
    </div>
    <div class="score-display" id="awayScoreDisplay">0</div>
    <div class="score-btns">
      <button class="btn btn-try"  onclick="addScore('away',5)">+5<span class="btn-label">Try</span></button>
      <button class="btn btn-pen"  onclick="addScore('away',3)">+3<span class="btn-label">Penalty</span></button>
      <button class="btn btn-con"  onclick="addScore('away',2)">+2<span class="btn-label">Conv.</span></button>
      <button class="btn btn-undo" onclick="addScore('away',-1)">-1<span class="btn-label">Fix</span></button>
    </div>
    <div class="try-row">
      <button class="try-btn" onclick="addTries('away',-1)">−</button>
      <div class="try-display">Tries: <span id="awayTriesDisplay">0</span></div>
      <button class="try-btn" onclick="addTries('away',1)">+</button>
    </div>
  </div>

  <!-- Timer -->
  <div class="card timer-card">
    <div class="card-title">Match Timer</div>
    <div class="timer-face paused" id="timerFace">00:00</div>
    <div class="timer-btn-row">
      <button class="btn-timer btn-start"  id="btnStart" onclick="timerStart()">▶ Start</button>
      <button class="btn-timer btn-pause"  id="btnPause" onclick="timerPause()" disabled>⏸ Pause</button>
      <button class="btn-timer btn-treset"              onclick="timerReset()">↺ Reset</button>
    </div>
    <div class="time-set-row">
      <span>Set:</span>
      <input type="number" id="setMins" min="0" max="199" value="0" inputmode="numeric" />
      <span>:</span>
      <input type="number" id="setSecs" min="0" max="59" value="0" inputmode="numeric" />
      <button class="btn-settime" onclick="timerSet()">Set</button>
      <button class="btn-settime" onclick="quickSet(0)">0:00</button>
      <button class="btn-settime" onclick="quickSet(40)">40:00</button>
    </div>
  </div>

  <!-- Reset -->
  <div class="card">
    <button class="btn-reset" onclick="resetMatch()">⚡ Reset Entire Match</button>
  </div>

</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Connecting to Firebase…</span>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  // ── Firebase ──
  const app = firebase.initializeApp({
    databaseURL: 'https://stream-tools-mrc-default-rtdb.europe-west1.firebasedatabase.app'
  });
  const db  = firebase.database();
  const ref = db.ref('overlayData');

  let state = {
    homeName:'HOME', awayName:'AWAY',
    homeScore:0, awayScore:0,
    homeTries:0, awayTries:0,
    homeColor:'#1e6bb8', awayColor:'#b81e1e',
    timerSeconds:0, timerRunning:false, timerStartedAt:null
  };

  let localTick = null, colorDebounce = null, ignoreNext = false;

  // ── Status ──
  function setStatus(type, msg) {
    document.getElementById('statusDot').className = 'status-dot ' + type;
    document.getElementById('statusText').textContent = msg;
  }

  // ── Push to Firebase (instant) ──
  function push() {
    ignoreNext = true;  // prevent the listener from overwriting local state
    ref.set(state)
      .then(() => setStatus('ok', `Synced · ${state.homeName} ${state.homeScore}–${state.awayScore} ${state.awayName} · ${new Date().toLocaleTimeString()}`))
      .catch(() => setStatus('err', 'Write failed.'));
  }

  // ── Listen for remote changes (e.g. another device) ──
  ref.on('value', snap => {
    if (ignoreNext) { ignoreNext = false; return; }
    const d = snap.val();
    if (!d) return;
    state = { homeColor:'#1e6bb8', awayColor:'#b81e1e', homeTries:0, awayTries:0, timerSeconds:0, timerRunning:false, timerStartedAt:null, ...d };
    if (state.timerRunning && state.timerStartedAt) {
      state.timerSeconds += (Date.now() - state.timerStartedAt) / 1000;
      state.timerStartedAt = Date.now();
    }
    renderUI();
    setStatus('ok', `Connected · ${state.homeName} ${state.homeScore}–${state.awayScore} ${state.awayName}`);
  });

  // ── Timer ──
  function getLiveSeconds() {
    const base = state.timerSeconds || 0;
    if (!state.timerRunning || !state.timerStartedAt) return base;
    return base + (Date.now() - state.timerStartedAt) / 1000;
  }
  function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }
  function tickDisplay() {
    const s = getLiveSeconds();
    const face = document.getElementById('timerFace');
    face.textContent = `${pad(s/60)}:${pad(s%60)}`;
    face.className   = 'timer-face' + (state.timerRunning ? '' : ' paused');
  }
  function startLocalTick() { clearInterval(localTick); localTick = setInterval(tickDisplay, 200); }

  function timerStart() {
    if (state.timerRunning) return;
    state.timerRunning = true; state.timerStartedAt = Date.now();
    updateTimerButtons(); push();
  }
  function timerPause() {
    if (!state.timerRunning) return;
    state.timerSeconds += (Date.now() - state.timerStartedAt) / 1000;
    state.timerRunning = false; state.timerStartedAt = null;
    updateTimerButtons(); push();
  }
  function timerReset() {
    state.timerRunning = false; state.timerSeconds = 0; state.timerStartedAt = null;
    updateTimerButtons(); tickDisplay(); push();
  }
  function timerSet() {
    const m = parseInt(document.getElementById('setMins').value)||0;
    const s = parseInt(document.getElementById('setSecs').value)||0;
    const was = state.timerRunning;
    state.timerRunning = false; state.timerSeconds = m*60+s; state.timerStartedAt = null;
    if (was) { state.timerRunning = true; state.timerStartedAt = Date.now(); }
    updateTimerButtons(); push();
  }
  function quickSet(mins) {
    const was = state.timerRunning;
    state.timerRunning = false; state.timerSeconds = mins*60; state.timerStartedAt = null;
    if (was) { state.timerRunning = true; state.timerStartedAt = Date.now(); }
    updateTimerButtons(); push();
  }
  function updateTimerButtons() {
    document.getElementById('btnStart').disabled = state.timerRunning;
    document.getElementById('btnPause').disabled = !state.timerRunning;
  }

  // ── Scores ──
  function addScore(team, pts) {
    state[team+'Score'] = Math.max(0,(state[team+'Score']||0)+pts);
    if (pts === 5) state[team+'Tries'] = (state[team+'Tries']||0) + 1;
    renderUI(); push();
  }

  function addTries(team, n) {
    state[team+'Tries'] = Math.max(0, (state[team+'Tries']||0) + n);
    renderUI(); push();
  }

  function resetMatch() {
    if (!confirm('Reset scores, tries and timer?')) return;
    state.homeScore=0; state.awayScore=0;
    state.homeTries=0; state.awayTries=0;
    state.timerSeconds=0; state.timerRunning=false; state.timerStartedAt=null;
    renderUI(); push();
  }

  // ── Colours ──
  function applyColors() {
    const hc = state.homeColor||'#1e6bb8', ac = state.awayColor||'#b81e1e';
    document.getElementById('homeCard').style.borderTopColor = hc;
    document.getElementById('homeScoreDisplay').style.color  = hc;
    document.getElementById('awayCard').style.borderTopColor = ac;
    document.getElementById('awayScoreDisplay').style.color  = ac;
  }
  function onColorChange(team) {
    state[team+'Color'] = document.getElementById(team+'ColorPicker').value;
    applyColors();
    clearTimeout(colorDebounce);
    colorDebounce = setTimeout(push, 400);
  }

  // ── Render ──
  function renderUI() {
    document.getElementById('homeNameInput').value   = state.homeName;
    document.getElementById('awayNameInput').value   = state.awayName;
    document.getElementById('homeScoreDisplay').textContent = state.homeScore;
    document.getElementById('awayScoreDisplay').textContent = state.awayScore;
    document.getElementById('homeTriesDisplay').textContent = state.homeTries || 0;
    document.getElementById('awayTriesDisplay').textContent = state.awayTries || 0;
    document.getElementById('homeColorPicker').value = state.homeColor||'#1e6bb8';
    document.getElementById('awayColorPicker').value = state.awayColor||'#b81e1e';
    applyColors(); updateTimerButtons();
  }

  document.getElementById('homeNameInput').addEventListener('change', e => { state.homeName = e.target.value.toUpperCase()||'HOME'; push(); });
  document.getElementById('awayNameInput').addEventListener('change', e => { state.awayName = e.target.value.toUpperCase()||'AWAY'; push(); });

  startLocalTick();
</script>
</body>
</html>
